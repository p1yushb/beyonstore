<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Details | Beyon Jewels</title>
  <meta name="description" content="Store hours, directions, and booking for Beyon Jewels." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geom:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body class="detail-page">

  <!-- ============================================================
       STICKY ACTION BAR
       ============================================================ -->
  <div class="detail-action-bar" id="actionBar" role="toolbar" aria-label="Store quick actions">
    <div class="container">
      <div class="detail-action-bar-inner">
        <p class="store-breadcrumb">
          <a href="index.html">&#8592; All Stores</a>
          <span id="breadcrumbStoreName" style="margin-left:8px; color: var(--color-grey-500);"></span>
        </p>
        <div class="detail-ctas" id="detailCtas">
          <!-- Rendered by detail-app.js -->
        </div>
      </div>
    </div>
  </div>



  <!-- ============================================================
       STORE DETAIL CONTENT
       ============================================================ -->
  <main class="detail-content" id="detailContent">
    <div class="container">
      <div class="detail-grid">

        <!-- LEFT — Store Info -->
        <div class="detail-main" id="detailMain">
          <!-- Rendered by detail-app.js -->
          <div style="text-align:center; padding: 4rem 0; color: var(--color-grey-500);">
            <p>Loading store details…</p>
          </div>
        </div>

        <!-- RIGHT — Sidebar -->
        <aside class="detail-sidebar" id="detailSidebar">
          <!-- Rendered by detail-app.js -->
        </aside>

      </div>
    </div>
  </main>

  <!-- ============================================================
       BOOKING MODAL
       ============================================================ -->
  <div
    class="modal-overlay hidden"
    id="bookingModal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="bookingModalTitle"
  >
    <div class="modal">
      <button class="modal-close" id="closeModal" aria-label="Close booking form">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-header">
        <h2 id="bookingModalTitle">Book a Visit</h2>
        <p class="modal-store-name" id="bookingStoreName">at Beyon Jewels</p>
      </div>
      <form class="booking-form" id="bookingForm" novalidate>

        <p class="form-section-label">Your Details</p>

        <div class="form-row">
          <div class="form-group">
            <label for="bookingName">Full Name <span aria-hidden="true">*</span></label>
            <input type="text" id="bookingName" name="name" placeholder="Your name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="bookingPhone">Phone <span aria-hidden="true">*</span></label>
            <input type="tel" id="bookingPhone" name="phone" placeholder="+91 00000 00000" required autocomplete="tel" />
          </div>
        </div>

        <hr class="form-divider" />
        <p class="form-section-label">Store &amp; Time</p>

        <div class="form-row">
          <div class="form-group">
            <label for="bookingCity">City</label>
            <input type="text" id="bookingCity" name="city" readonly />
          </div>
          <div class="form-group">
            <label for="bookingStore">Store</label>
            <input type="text" id="bookingStore" name="store" readonly />
          </div>
        </div>

        <div class="form-group">
          <label for="bookingDate">Preferred Date <span aria-hidden="true">*</span></label>
          <input type="date" id="bookingDate" name="date" required />
        </div>

        <div class="form-group">
          <label for="bookingNotes">Special Requests</label>
          <textarea id="bookingNotes" name="notes" placeholder="Tell us about the occasion or any preferences…"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Confirm Appointment</button>

      </form>
      <div id="bookingSuccess" style="display:none;">
        <div class="booking-success">
          <div class="success-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h3>Appointment Requested</h3>
          <p>We've received your request and will confirm your appointment shortly via email or phone.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    /**
     * Store Detail Page Logic
     * Reads ?id= from URL, finds store in STORES, and renders the detail view.
     * Ref: execution_plan.md § 3B — Store Detail View
     */
    (async function () {
      /* Show loading while API fetches */
      document.getElementById('detailMain').innerHTML =
        `<div class="stores-loading">Loading store details…</div>`;

      try {
        await loadStores();
      } catch (err) {
        document.getElementById('detailMain').innerHTML = `
          <div style="text-align:center; padding: 4rem 0;">
            <p style="font-family: var(--font-serif); font-size: 1.5rem; color: var(--color-charcoal); margin-bottom: 1rem;">Could not load store data</p>
            <a href="index.html" style="color: var(--color-gold); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em;">← Back to all stores</a>
          </div>`;
        return;
      }

      const params  = new URLSearchParams(window.location.search);
      const storeId = params.get('id');
      const store   = STORES.find(s => s.store_id === storeId);

      if (!store) {
        document.getElementById('detailMain').innerHTML = `
          <div style="text-align:center; padding: 4rem 0;">
            <p style="font-family: var(--font-serif); font-size: 1.5rem; color: var(--color-charcoal); margin-bottom: 1rem;">Store Not Found</p>
            <a href="index.html" style="color: var(--color-gold); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em;">← Back to all stores</a>
          </div>`;
        return;
      }

      /* Update page title */
      document.title = `${store.name} | Beyon Jewels`;

      /* Breadcrumb */
      const breadcrumb = document.getElementById('breadcrumbStoreName');
      if (breadcrumb) breadcrumb.textContent = `/ ${store.name}`;

      /* Status */
      const now      = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const dayIdx   = now.getDay();
      const todayName = DAY_NAMES[dayIdx];
      const todayHours = store.regular_hours.find(h => h.day === todayName);

      function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
      function fmtTime(t) {
        const [h,m]=t.split(':').map(Number);
        return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
      }

      const curMin  = now.getHours()*60 + now.getMinutes();
      const isOpen  = todayHours
        ? curMin >= toMin(todayHours.open) && curMin < toMin(todayHours.close)
        : false;

      const statusBadge = isOpen
        ? `<span class="badge badge--open"><span class="badge-dot"></span>Open Now</span>`
        : `<span class="badge badge--closed"><span class="badge-dot"></span>Closed</span>`;

      const closingNote = isOpen && todayHours
        ? `<span style="font-size:0.8rem; color:var(--color-grey-500); margin-left:8px;">Closes at ${fmtTime(todayHours.close)}</span>`
        : (todayHours && !isOpen)
          ? `<span style="font-size:0.8rem; color:var(--color-grey-500); margin-left:8px;">Opens at ${fmtTime(todayHours.open)}</span>`
          : '';

      /* Stars */
      const fullStars  = Math.round(store.rating);
      const starsHtml  = Array.from({length:5}, (_,i) =>
        `<span style="color:${i < fullStars ? 'var(--color-gold)' : 'var(--color-grey-300)'}">★</span>`
      ).join('');

      /* Google Maps URLs
         mapsUrl → opens Google Maps searching by name + coordinates (surfaces the business listing)
         dirUrl  → opens turn-by-turn directions to the store            */
      const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(store.name)}&ll=${store.coordinates.lat},${store.coordinates.lng}&z=17`;
      const dirUrl  = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(store.name + ', ' + store.address)}`;

      /* CTA Bar — Icon-only Call | Directions | Book a Visit (red) */
      document.getElementById('detailCtas').innerHTML = `
        <a href="tel:${store.phone}" class="btn btn-call btn-lg" aria-label="Call ${store.name}">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.08 6.08l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span class="btn-label">Call Store</span>
        </a>
        <a href="${dirUrl}" target="_blank" rel="noopener" class="btn btn-directions btn-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          <span class="btn-label">Directions</span>
        </a>
        <button class="btn btn-book btn-lg js-open-booking-detail" data-store-id="${store.store_id}" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Book a Visit
        </button>
      `;

      /* Hours Table */
      const hoursRows = DAY_NAMES.map((day, i) => {
        const h = store.regular_hours.find(r => r.day === day);
        const isToday = i === dayIdx;
        return `
          <tr class="${isToday ? 'today' : ''}">
            <td class="day-name">${DAY_SHORT[i]}${isToday ? ' <span style="font-size:0.65rem;color:var(--color-gold);letter-spacing:0.08em;text-transform:uppercase;">Today</span>' : ''}</td>
            <td class="day-hours">${h ? `${fmtTime(h.open)} – ${fmtTime(h.close)}` : 'Closed'}</td>
          </tr>`;
      }).join('');

      /* Attributes — only render items that have real values */
      const hasParking = store.attributes.parking === true;
      const langs = (store.attributes.languages || []).filter(l => l && l.trim());
      const hasLanguages = langs.length > 0;

      const parkingItem = hasParking ? `
        <div class="attribute-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/></svg>
          <span>Parking available</span>
        </div>` : '';

      const langChips = langs.map(l => `<span class="lang-chip">${l}</span>`).join('');
      const languagesItem = hasLanguages ? `
        <div class="attribute-item" style="flex-direction:column; align-items:flex-start; gap:8px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>Languages spoken</span>
          </div>
          <div class="language-chips">${langChips}</div>
        </div>` : '';

      const attributesSection = (hasParking || hasLanguages) ? `
        <div class="detail-card">
          <p class="detail-card-title">Store Attributes</p>
          <div class="attribute-list">
            ${parkingItem}
            ${languagesItem}
          </div>
        </div>` : '';

      /* Main Content */
      document.getElementById('detailMain').innerHTML = `
        <div class="detail-card">
          <h1 class="detail-store-name">${store.name}</h1>
          <div class="detail-meta-row">
            ${statusBadge}${closingNote}
            <div class="detail-rating">
              <div class="stars-row">${starsHtml}</div>
              <span class="detail-rating-value">${store.rating}</span>
              <span class="detail-review-count">(${store.review_count} reviews)</span>
            </div>
          </div>
          <div class="detail-address-block">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div>
              <p>${store.address}</p>
              <a href="${mapsUrl}" target="_blank" rel="noopener" style="font-size:0.8rem; color:var(--color-gold); letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid rgba(211,11,57,0.4); padding-bottom:1px; display:inline-block; margin-top:6px;">View on Google Maps</a>
            </div>
          </div>
          <div class="detail-phone-block">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.08 6.08l1.79-1.79a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <a href="tel:${store.phone}">${store.phone}</a>
          </div>
        </div>

        ${attributesSection}

        <div class="detail-card">
          <p class="detail-card-title">Store Gallery</p>
          <div class="store-gallery">
            <img src="Images/bottom-1.webp" alt="${store.name} — photo 1" loading="lazy" class="gallery-img" />
            <img src="Images/bottom-2.webp" alt="${store.name} — photo 2" loading="lazy" class="gallery-img" />
            <img src="Images/bottom-3.webp" alt="${store.name} — photo 3" loading="lazy" class="gallery-img" />
          </div>
        </div>

        <div class="detail-card">
          <p class="detail-card-title">Location</p>
          <div class="map-embed-wrap">
            <iframe
              src="https://maps.google.com/maps?q=${store.coordinates.lat},${store.coordinates.lng}&z=17&output=embed"
              width="100%"
              height="280"
              style="border:0; border-radius: var(--radius-lg); display:block;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              title="Map of ${store.name}">
            </iframe>
          </div>
        </div>
      `;

      /* Sidebar — Hours */
      document.getElementById('detailSidebar').innerHTML = `
        <div class="detail-card">
          <p class="detail-card-title">Opening Hours</p>
          <table class="hours-table" aria-label="Store opening hours">
            <tbody>${hoursRows}</tbody>
          </table>
        </div>

        <div class="detail-card" style="margin-top: var(--space-5);">
          <p class="detail-card-title">Book a Visit</p>
          <p style="font-size:var(--text-sm); color:var(--color-grey-500); margin-bottom:var(--space-5); line-height:1.6;">
            Drop by to play with jewellery<br>Or honestly, just come in for a cup of coffee!
          </p>
          <button class="btn btn-primary btn-full js-open-booking-detail" data-store-id="${store.store_id}" type="button">
            Book a Visit
          </button>
        </div>
      `;

      /* Wire Book a Visit buttons now that they're in the DOM */
      document.querySelectorAll('.js-open-booking-detail').forEach(btn => {
        btn.addEventListener('click', () => openBookingModal(btn.dataset.storeId));
      });

      /* Close modal */
      const closeBtn = document.getElementById('closeModal');
      if (closeBtn) closeBtn.addEventListener('click', closeBookingModal);

      const modal = document.getElementById('bookingModal');
      if (modal) modal.addEventListener('click', e => { if (e.target === modal) closeBookingModal(); });

      const bookingForm = document.getElementById('bookingForm');
      if (bookingForm) bookingForm.addEventListener('submit', handleBookingSubmit);

    })();
  </script>

</body>
</html>
